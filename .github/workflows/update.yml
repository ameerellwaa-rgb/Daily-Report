name: Update Dashboard

on:
  schedule:
    - cron: '30 8 * * *'   # 10:30 صباحاً توقيت القاهرة
    - cron: '0 14 * * *'   # 4:00 مساءً توقيت القاهرة
  workflow_dispatch:        # زرار تشغيل يدوي من GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate dashboard
        env:
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
        run: node generate.js

      - name: Commit & push
        run: |
          git config user.name  "Dashboard Bot"
          git config user.email "bot@ellwaa.com"
          git add index.html debug.json
          git diff --staged --quiet || git commit -m "Update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push