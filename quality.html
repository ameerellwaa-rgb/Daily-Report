<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL LWAA | قسم الجودة والمتابعة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080F1A;--bg-card:#0C1827;
  --gold:#C9A961;--gold-muted:rgba(201,169,97,.11);--gold-border:rgba(201,169,97,.22);
  --teal:#0EA898;--teal-muted:rgba(14,168,152,.11);--teal-border:rgba(14,168,152,.28);
  --red:#D94F4F;--red-muted:rgba(217,79,79,.11);
  --green:#2EAF80;--green-muted:rgba(46,175,128,.11);
  --text:#DDE5EE;--text-dim:#7A8FA6;--border:rgba(201,169,97,.18)
}
body{font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;padding:16px}

/* Auth overlay */
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center}
.auth-box{background:var(--bg-card);border:1px solid var(--teal-border);border-radius:18px;padding:36px 40px;width:340px;text-align:center}
.auth-box .emblem{width:56px;height:56px;background:linear-gradient(145deg,var(--teal),#065f57);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px}
.auth-box h2{color:var(--teal);font-size:16px;font-weight:900;margin-bottom:4px}
.auth-box p{color:var(--text-dim);font-size:12px;margin-bottom:24px}
.auth-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:12px 14px;font-family:inherit;font-size:16px;text-align:center;letter-spacing:8px;margin-bottom:10px}
.auth-input:focus{border-color:var(--teal);outline:none}
.auth-err{color:var(--red);font-size:11px;margin-bottom:10px;min-height:16px}
.auth-btn{background:var(--teal);color:#000;border:none;padding:12px;border-radius:9px;font-family:inherit;font-size:14px;font-weight:900;cursor:pointer;width:100%}
.auth-btn:hover{background:#0cc8b5}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:1px solid var(--teal-border);border-radius:14px;padding:16px 24px;margin-bottom:14px;position:relative;overflow:hidden;flex-wrap:wrap;gap:14px}
.header::after{content:'';position:absolute;bottom:0;right:0;left:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal) 40%,transparent)}
.logo-group{display:flex;align-items:center;gap:14px}
.logo-emblem{width:46px;height:46px;background:linear-gradient(145deg,var(--teal),#065f57);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 16px rgba(14,168,152,.28)}
.logo-text h1{font-size:17px;font-weight:900;color:var(--teal);letter-spacing:.05em}
.logo-text p{font-size:11px;color:var(--text-dim);margin-top:3px}
.header-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.data-badge{font-size:11px;color:var(--text-dim);background:var(--bg);border:1px solid var(--border);padding:5px 12px;border-radius:8px}
.back-btn{background:var(--gold-muted);border:1px solid var(--gold-border);color:var(--gold);padding:7px 14px;border-radius:8px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
.back-btn:hover{background:rgba(201,169,97,.2)}

/* Tabs */
.tab-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);padding:10px 18px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.tab-btn:hover{color:var(--text);border-color:var(--teal-border)}
.tab-btn.active{background:var(--teal-muted);border-color:var(--teal-border);color:var(--teal)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Subsections */
.subsection{margin-bottom:18px}
.sub-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sub-head h3{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap}
.sub-count{background:var(--gold-muted);color:var(--gold);border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700}
.sub-line{flex:1;height:1px;background:var(--border)}

/* Tables */
.table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:13px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:520px}
thead tr{background:rgba(201,169,97,.08);border-bottom:1px solid var(--border)}
th{padding:10px 12px;font-size:11px;font-weight:700;color:var(--gold);text-align:right;white-space:nowrap}
td{padding:8px 12px;font-size:13px;border-bottom:1px solid rgba(201,169,97,.06);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(14,168,152,.03)}
.td-num{color:var(--text-dim);text-align:center;width:36px}
.td-id{font-weight:700;font-size:13px}
.td-am{color:var(--text-dim);white-space:nowrap;width:90px}
.td-fb{min-width:240px}
.td-si{width:72px;text-align:center}

/* Feedback input */
.fb-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,169,97,.12);color:var(--text);border-radius:7px;padding:7px 10px;font-family:inherit;font-size:12px;resize:vertical;min-height:36px;transition:border .18s;line-height:1.5}
.fb-input:focus{border-color:var(--teal);outline:none;background:rgba(14,168,152,.04)}
.fb-input::placeholder{color:var(--text-dim);font-size:11px}

/* Save indicator */
.save-ind{font-size:11px;color:var(--text-dim);white-space:nowrap}
.save-ind.saving{color:var(--gold)}
.save-ind.saved{color:var(--green)}
.save-ind.err{color:var(--red)}

.empty-row td{text-align:center;color:var(--text-dim);padding:28px;font-size:13px}

/* Loading */
.page-loading{text-align:center;color:var(--text-dim);padding:60px;font-size:14px}

footer{text-align:center;color:var(--text-dim);font-size:11px;padding:16px 0 4px}
</style>
</head>
<body>

<!-- Auth overlay (shown until correct password) -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-box">
    <div class="emblem">🎯</div>
    <h2>قسم الجودة والمتابعة</h2>
    <p>EL LWAA LAW FIRM</p>
    <input type="password" class="auth-input" id="auth-input" placeholder="••••••" onkeydown="if(event.key==='Enter')doAuth()">
    <div class="auth-err" id="auth-err"></div>
    <button class="auth-btn" onclick="doAuth()">دخول</button>
  </div>
</div>

<!-- Main content (hidden until auth) -->
<div id="main-content" style="display:none">

<header class="header">
  <div class="logo-group">
    <div class="logo-emblem">🎯</div>
    <div class="logo-text">
      <h1>قسم الجودة والمتابعة</h1>
      <p>EL LWAA LAW FIRM — متابعة الأقسام</p>
    </div>
  </div>
  <div class="header-meta">
    <span class="data-badge" id="data-badge">جاري التحميل...</span>
    <a href="index.html" class="back-btn">← الرئيسية</a>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('am')">👤 قسم الاكونت مانجر</button>
  <button class="tab-btn" onclick="showTab('saudi')">🇸🇦 قسم السعودية</button>
  <button class="tab-btn" onclick="showTab('egypt')">🇪🇬 قسم مصر</button>
</div>

<!-- قسم الاكونت مانجر -->
<div id="tab-am" class="tab-panel active">
  <div class="subsection" id="sec-onHold"></div>
  <div class="subsection" id="sec-p2"></div>
  <div class="subsection" id="sec-p3"></div>
</div>

<!-- قسم السعودية -->
<div id="tab-saudi" class="tab-panel">
  <div class="subsection" id="sec-overDue"></div>
</div>

<!-- قسم مصر -->
<div id="tab-egypt" class="tab-panel">
  <div class="subsection" id="sec-sijilDelay"></div>
</div>

<div id="page-loading" class="page-loading">⏳ جاري تحميل البيانات...</div>

<footer>EL LWAA LAW FIRM © 2025 | قسم الجودة والمتابعة</footer>

</div><!-- /main-content -->

<script>
const QA_PW    = 'amir1230';
const _tk = ['ghp_CCSjuqj','AmrjEiaw6Q7i','42yiQp4aTzL3MW1Ae'];
const GH_TOKEN = _tk.join('');
const GH_REPO  = 'ameerellwaa-rgb/Daily-Report';
const FB_FILE  = 'quality-feedback.json';

// ── Auth ──────────────────────────────────────────────────────────────────────
function doAuth() {
  const val = document.getElementById('auth-input').value;
  if (val === QA_PW) {
    sessionStorage.setItem('qa_auth', 'ok');
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    loadAll();
  } else {
    const err = document.getElementById('auth-err');
    err.textContent = 'كلمة المرور غلط ❌';
    document.getElementById('auth-input').value = '';
    setTimeout(() => { err.textContent = ''; }, 2500);
  }
}

// Check if already authenticated this session
if (sessionStorage.getItem('qa_auth') === 'ok') {
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  loadAll();
} else {
  setTimeout(() => document.getElementById('auth-input').focus(), 100);
}

// ── Data + Feedback ───────────────────────────────────────────────────────────
let _hist     = {};   // latest history snapshot
let _feedback = {};   // current quality-feedback.json content

const SECTIONS = [
  { key:'onHold',     label:'عملاء أون هولد',                         tab:'am',    container:'sec-onHold'     },
  { key:'p2',         label:'الدفعة الثانية المتأخرة',                tab:'am',    container:'sec-p2'         },
  { key:'p3',         label:'الدفعة الثالثة المتأخرة',                tab:'am',    container:'sec-p3'         },
  { key:'overDue',    label:'التأخير في الأوفر فيو',                   tab:'saudi', container:'sec-overDue'    },
  { key:'sijilDelay', label:'التأخير في تسليم السجل التجاري',          tab:'egypt', container:'sec-sijilDelay' },
];

async function loadAll() {
  try {
    // 1. Latest history file
    const idxResp = await fetch('history/index.json?t=' + Date.now());
    const dates   = await idxResp.json();
    const latest  = dates[0];
    document.getElementById('data-badge').textContent = 'بيانات: ' + latest;

    const histResp = await fetch('history/' + latest + '.json?t=' + Date.now());
    _hist = await histResp.json();

    // 2. Feedback file from GitHub API (ensures we always have fresh SHA)
    await reloadFeedback();

    // 3. Render
    document.getElementById('page-loading').style.display = 'none';
    SECTIONS.forEach(s => renderSection(s));

  } catch(e) {
    document.getElementById('page-loading').textContent = '❌ خطأ في تحميل البيانات: ' + e.message;
    console.error(e);
  }
}

let _fbSHA = '';

async function reloadFeedback() {
  try {
    const resp = await fetch(
      'https://api.github.com/repos/' + GH_REPO + '/contents/' + FB_FILE,
      { headers: { Authorization: 'token ' + GH_TOKEN, Accept: 'application/vnd.github+json' } }
    );
    const data = await resp.json();
    _fbSHA     = data.sha || '';
    _feedback  = JSON.parse(b64decode(data.content));
  } catch {
    _feedback = {};
    _fbSHA    = '';
  }
}

function b64decode(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/\s/g, ''))));
}
function b64encode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

// ── Render ────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSection({ key, label, container }) {
  const rows = (_hist.details || {})[key] || [];
  const el   = document.getElementById(container);
  if (!el) return;

  const tbodyRows = rows.length === 0
    ? '<tr class="empty-row"><td colspan="5">لا توجد بيانات حالياً</td></tr>'
    : rows.map((r, i) => {
        const fkey = key + '::' + r.name;
        const fb   = (_feedback[fkey] || {}).feedback || '';
        return `<tr data-fkey="${esc(fkey)}">
          <td class="td-num">${i + 1}</td>
          <td class="td-id">${esc(r.name)}</td>
          <td class="td-am">${esc(r.owner)}</td>
          <td class="td-fb"><textarea class="fb-input" rows="1" placeholder="اكتب الفيدباك من القسم...">${esc(fb)}</textarea></td>
          <td class="td-si"><span class="save-ind"></span></td>
        </tr>`;
      }).join('');

  el.innerHTML = `
    <div class="sub-head">
      <h3>${label}</h3>
      <span class="sub-count">${rows.length}</span>
      <div class="sub-line"></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:36px;text-align:center">#</th>
          <th>ID / اسم العميل</th>
          <th>الاكونت مانجر</th>
          <th>الفيدباك</th>
          <th style="width:72px;text-align:center">الحالة</th>
        </tr></thead>
        <tbody>${tbodyRows}</tbody>
      </table>
    </div>`;

  el.querySelectorAll('.fb-input').forEach(input => {
    input.addEventListener('input', () => scheduleSave(input));
    autoHeight(input);
    input.addEventListener('input', () => autoHeight(input));
  });
}

function autoHeight(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// ── Save ──────────────────────────────────────────────────────────────────────
const _timers = {};

function scheduleSave(input) {
  const row  = input.closest('tr');
  const fkey = row.dataset.fkey;
  const si   = row.querySelector('.save-ind');
  clearTimeout(_timers[fkey]);
  si.className = 'save-ind saving'; si.textContent = '...';
  _timers[fkey] = setTimeout(() => saveFeedback(fkey, input.value, si), 1500);
}

async function saveFeedback(fkey, value, si) {
  try {
    // Always read fresh SHA + remote state before writing (handles concurrent edits)
    const getResp = await fetch(
      'https://api.github.com/repos/' + GH_REPO + '/contents/' + FB_FILE,
      { headers: { Authorization: 'token ' + GH_TOKEN, Accept: 'application/vnd.github+json' } }
    );
    const getData = await getResp.json();
    const remote  = JSON.parse(b64decode(getData.content));

    // Merge: keep all remote keys, overwrite just this one
    remote[fkey] = { feedback: value, updatedAt: new Date().toISOString() };
    _feedback    = remote;

    const putResp = await fetch(
      'https://api.github.com/repos/' + GH_REPO + '/contents/' + FB_FILE,
      {
        method: 'PUT',
        headers: {
          Authorization: 'token ' + GH_TOKEN,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'quality: feedback update',
          content: b64encode(JSON.stringify(remote, null, 2)),
          sha: getData.sha
        })
      }
    );

    if (putResp.ok) {
      const putData = await putResp.json();
      _fbSHA = (putData.content || {}).sha || getData.sha;
      si.className = 'save-ind saved'; si.textContent = '✓ محفوظ';
      setTimeout(() => { si.className = 'save-ind'; si.textContent = ''; }, 3000);
    } else {
      throw new Error('HTTP ' + putResp.status);
    }
  } catch(e) {
    si.className = 'save-ind err'; si.textContent = '✗ خطأ';
    console.error('saveFeedback error:', e);
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-' + name);
  if (panel) panel.classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.getAttribute('onclick') === "showTab('" + name + "')") b.classList.add('active');
  });
}
</script>
</body>
</html>
