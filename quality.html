<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL LWAA | قسم الجودة والمتابعة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080F1A;--bg-card:#0C1827;
  --gold:#C9A961;--gold-muted:rgba(201,169,97,.11);--gold-border:rgba(201,169,97,.22);
  --teal:#0EA898;--teal-muted:rgba(14,168,152,.11);--teal-border:rgba(14,168,152,.28);
  --red:#D94F4F;--red-muted:rgba(217,79,79,.11);
  --green:#2EAF80;--green-muted:rgba(46,175,128,.11);
  --text:#DDE5EE;--text-dim:#7A8FA6;--border:rgba(201,169,97,.18)
}
body{font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;padding:16px}

/* ── Auth ─────────────────────────────────────────── */
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center}
.auth-box{background:var(--bg-card);border:1px solid var(--teal-border);border-radius:18px;padding:36px 40px;width:340px;text-align:center}
.auth-emblem{width:56px;height:56px;background:linear-gradient(145deg,var(--teal),#065f57);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px}
.auth-box h2{color:var(--teal);font-size:16px;font-weight:900;margin-bottom:4px}
.auth-box p{color:var(--text-dim);font-size:12px;margin-bottom:24px}
.auth-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:12px 14px;font-family:inherit;font-size:16px;text-align:center;letter-spacing:8px;margin-bottom:10px}
.auth-input:focus{border-color:var(--teal);outline:none}
.auth-err{color:var(--red);font-size:11px;margin-bottom:10px;min-height:16px}
.auth-btn{background:var(--teal);color:#000;border:none;padding:12px;border-radius:9px;font-family:inherit;font-size:14px;font-weight:900;cursor:pointer;width:100%}
.auth-btn:hover{background:#0cc8b5}

/* ── Header ───────────────────────────────────────── */
.header{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:1px solid var(--teal-border);border-radius:14px;padding:16px 24px;margin-bottom:14px;position:relative;overflow:hidden;flex-wrap:wrap;gap:14px}
.header::after{content:'';position:absolute;bottom:0;right:0;left:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal) 40%,transparent)}
.logo-group{display:flex;align-items:center;gap:14px}
.logo-emblem{width:46px;height:46px;background:linear-gradient(145deg,var(--teal),#065f57);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 16px rgba(14,168,152,.28)}
.logo-text h1{font-size:17px;font-weight:900;color:var(--teal);letter-spacing:.05em}
.logo-text p{font-size:11px;color:var(--text-dim);margin-top:3px}
.header-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.data-badge{font-size:11px;color:var(--text-dim);background:var(--bg);border:1px solid var(--border);padding:5px 12px;border-radius:8px}
.back-btn{background:var(--gold-muted);border:1px solid var(--gold-border);color:var(--gold);padding:7px 14px;border-radius:8px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
.back-btn:hover{background:rgba(201,169,97,.2)}

/* ── Main tabs ────────────────────────────────────── */
.tab-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);padding:10px 18px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.tab-btn:hover{color:var(--text);border-color:var(--teal-border)}
.tab-btn.active{background:var(--teal-muted);border-color:var(--teal-border);color:var(--teal)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Sub tabs ─────────────────────────────────────── */
.sub-tab-bar{display:flex;gap:6px;flex-wrap:wrap;background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:10px;padding:8px;margin-bottom:14px}
.sub-tab-btn{background:none;border:1px solid transparent;color:var(--text-dim);padding:7px 14px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px}
.sub-tab-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.sub-tab-btn.active{background:var(--bg-card);border-color:var(--border);color:var(--gold)}
.stc{border-radius:10px;padding:1px 8px;font-size:10px;background:var(--gold-muted);color:var(--gold)}
.sub-tab-btn.active .stc{background:var(--gold);color:#000}
.sub-panel{display:none}
.sub-panel.active{display:block}

/* ── Table ────────────────────────────────────────── */
.table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:13px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:500px}
thead tr{background:rgba(201,169,97,.08);border-bottom:1px solid var(--border)}
th{padding:10px 12px;font-size:11px;font-weight:700;color:var(--gold);text-align:right;white-space:nowrap}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(201,169,97,.06);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(14,168,152,.02)}
.td-num{color:var(--text-dim);text-align:center;width:36px;vertical-align:middle}
.td-id{font-weight:700;white-space:nowrap;vertical-align:middle}
.td-am{color:var(--text-dim);white-space:nowrap;width:90px;vertical-align:middle;text-align:center}
.td-notes{min-width:300px}

/* ── Notes thread ─────────────────────────────────── */
.notes-thread{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.note-item{display:flex;gap:8px;align-items:flex-start;padding:7px 9px;background:rgba(255,255,255,.03);border-radius:7px;border-right:2px solid var(--teal-border);position:relative}
.note-date{font-size:10px;color:var(--teal);white-space:nowrap;margin-top:2px;min-width:40px;font-weight:700}
.note-text{font-size:12px;color:var(--text);line-height:1.6;flex:1}
.note-del{background:none;border:none;color:transparent;cursor:pointer;font-size:10px;padding:2px 4px;border-radius:4px;transition:all .15s;flex-shrink:0}
.note-item:hover .note-del{color:var(--text-dim)}
.note-del:hover{color:var(--red)!important;background:var(--red-muted)}

/* ── New note form ────────────────────────────────── */
.note-new{display:flex;flex-direction:column;gap:5px}
.note-inp{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(201,169,97,.12);color:var(--text);border-radius:7px;padding:7px 10px;font-family:inherit;font-size:12px;resize:none;min-height:34px;transition:border .15s;line-height:1.5}
.note-inp:focus{border-color:var(--teal);outline:none;background:rgba(14,168,152,.04)}
.note-inp::placeholder{color:var(--text-dim);font-size:11px}
.note-actions{display:flex;align-items:center;gap:8px}
.note-add-btn{background:var(--teal-muted);border:1px solid var(--teal-border);color:var(--teal);padding:4px 13px;border-radius:6px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s}
.note-add-btn:hover{background:rgba(14,168,152,.25)}
.note-add-btn:disabled{opacity:.4;cursor:default}
.save-ind{font-size:10px;color:var(--text-dim)}
.save-ind.saving{color:var(--gold)}
.save-ind.saved{color:var(--green)}
.save-ind.err{color:var(--red)}

.placeholder-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:13px;padding:48px;text-align:center;color:var(--text-dim);font-size:13px}
.page-loading{text-align:center;color:var(--text-dim);padding:60px;font-size:14px}
footer{text-align:center;color:var(--text-dim);font-size:11px;padding:16px 0 4px}
</style>
</head>
<body>

<!-- Auth overlay -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-box">
    <div class="auth-emblem">🎯</div>
    <h2>قسم الجودة والمتابعة</h2>
    <p>EL LWAA LAW FIRM</p>
    <input type="password" class="auth-input" id="auth-input" placeholder="••••••" onkeydown="if(event.key==='Enter')doAuth()">
    <div class="auth-err" id="auth-err"></div>
    <button class="auth-btn" onclick="doAuth()">دخول</button>
  </div>
</div>

<div id="main-content" style="display:none">

<header class="header">
  <div class="logo-group">
    <div class="logo-emblem">🎯</div>
    <div class="logo-text">
      <h1>قسم الجودة والمتابعة</h1>
      <p>EL LWAA LAW FIRM — متابعة الأقسام</p>
    </div>
  </div>
  <div class="header-meta">
    <span class="data-badge" id="data-badge">جاري التحميل...</span>
    <a href="index.html" class="back-btn">← الرئيسية</a>
  </div>
</header>

<!-- Main tabs -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="showMainTab('am')">👤 قسم الاكونت مانجر</button>
  <button class="tab-btn" onclick="showMainTab('saudi')">🇸🇦 قسم السعودية</button>
  <button class="tab-btn" onclick="showMainTab('egypt')">🇪🇬 قسم مصر</button>
</div>

<!-- ── قسم الاكونت مانجر ── -->
<div id="tab-am" class="tab-panel active">
  <div class="sub-tab-bar">
    <button class="sub-tab-btn active" onclick="showSubTab('am','onHold')">
      عملاء أون هولد <span class="stc" id="stc-onHold">—</span>
    </button>
    <button class="sub-tab-btn" onclick="showSubTab('am','p2')">
      دفعة ثانية متأخرة <span class="stc" id="stc-p2">—</span>
    </button>
    <button class="sub-tab-btn" onclick="showSubTab('am','p3')">
      دفعة ثالثة متأخرة <span class="stc" id="stc-p3">—</span>
    </button>
  </div>
  <div id="sub-am-onHold" class="sub-panel active"></div>
  <div id="sub-am-p2"     class="sub-panel"></div>
  <div id="sub-am-p3"     class="sub-panel"></div>
</div>

<!-- ── قسم السعودية ── -->
<div id="tab-saudi" class="tab-panel">
  <div class="sub-tab-bar">
    <button class="sub-tab-btn active" onclick="showSubTab('saudi','overDue')">
      التأخير في الأوفر فيو <span class="stc" id="stc-overDue">—</span>
    </button>
    <button class="sub-tab-btn" onclick="showSubTab('saudi','clientApproval')">
      موافقة العميل على الأوفر فيو <span class="stc" id="stc-clientApproval">—</span>
    </button>
  </div>
  <div id="sub-saudi-overDue"        class="sub-panel active"></div>
  <div id="sub-saudi-clientApproval" class="sub-panel"></div>
</div>

<!-- ── قسم مصر ── -->
<div id="tab-egypt" class="tab-panel">
  <div class="sub-tab-bar">
    <button class="sub-tab-btn active" onclick="showSubTab('egypt','sijilDelay')">
      التأخير في السجل التجاري <span class="stc" id="stc-sijilDelay">—</span>
    </button>
    <button class="sub-tab-btn" onclick="showSubTab('egypt','sahayef')">
      التأخير في الصحايف <span class="stc" id="stc-sahayef">—</span>
    </button>
  </div>
  <div id="sub-egypt-sijilDelay" class="sub-panel active"></div>
  <div id="sub-egypt-sahayef"    class="sub-panel">
    <div class="placeholder-panel">⏳ قيد الإعداد — سيتم تفعيل هذا القسم قريباً</div>
  </div>
</div>

<div id="page-loading" class="page-loading">⏳ جاري تحميل البيانات...</div>

<footer>EL LWAA LAW FIRM © 2025 | قسم الجودة والمتابعة</footer>
</div>

<script>
const QA_PW    = 'amir1230';
const _tk      = ['ghp_CCSjuqj','AmrjEiaw6Q7i','42yiQp4aTzL3MW1Ae'];
const GH_TOKEN = _tk.join('');
const GH_REPO  = 'ameerellwaa-rgb/Daily-Report';
const FB_FILE  = 'quality-feedback.json';

// ── Auth ──────────────────────────────────────────────────────────────────────
function doAuth() {
  if (document.getElementById('auth-input').value === QA_PW) {
    sessionStorage.setItem('qa_auth','ok');
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    loadAll();
  } else {
    const e = document.getElementById('auth-err');
    e.textContent = 'كلمة المرور غلط ❌';
    document.getElementById('auth-input').value = '';
    setTimeout(() => { e.textContent = ''; }, 2500);
  }
}
if (sessionStorage.getItem('qa_auth') === 'ok') {
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  loadAll();
} else {
  setTimeout(() => document.getElementById('auth-input').focus(), 80);
}

// ── Config ────────────────────────────────────────────────────────────────────
const MAIN_TABS = ['am','saudi','egypt'];
const SUB_TABS  = {
  am:    ['onHold','p2','p3'],
  saudi: ['overDue','clientApproval'],
  egypt: ['sijilDelay','sahayef'],
};

// ── Data ──────────────────────────────────────────────────────────────────────
let _hist     = {};
let _feedback = {};

async function loadAll() {
  try {
    const idxR  = await fetch('history/index.json?t=' + Date.now());
    const dates = await idxR.json();
    const latest = dates[0];
    document.getElementById('data-badge').textContent = 'بيانات: ' + latest;

    const histR = await fetch('history/' + latest + '.json?t=' + Date.now());
    _hist = await histR.json();

    await reloadFeedback();

    document.getElementById('page-loading').style.display = 'none';

    // Render each sub-panel
    renderPanel('am',    'onHold',         'عملاء أون هولد');
    renderPanel('am',    'p2',              'الدفعة الثانية المتأخرة');
    renderPanel('am',    'p3',              'الدفعة الثالثة المتأخرة');
    renderPanel('saudi', 'overDue',         'التأخير في الأوفر فيو');
    renderPanel('saudi', 'clientApproval',  'موافقة العميل على الأوفر فيو');
    renderPanel('egypt', 'sijilDelay',      'التأخير في تسليم السجل التجاري');

  } catch(e) {
    document.getElementById('page-loading').textContent = '❌ خطأ: ' + e.message;
    console.error(e);
  }
}

async function reloadFeedback() {
  try {
    const r = await fetch(
      'https://api.github.com/repos/' + GH_REPO + '/contents/' + FB_FILE,
      { headers:{ Authorization:'token '+GH_TOKEN, Accept:'application/vnd.github+json' } }
    );
    _feedback = JSON.parse(b64dec((await r.json()).content));
  } catch { _feedback = {}; }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderPanel(mainTab, key, label) {
  const el = document.getElementById('sub-' + mainTab + '-' + key);
  if (!el) return;
  const rows = (_hist.details || {})[key] || [];

  const stc = document.getElementById('stc-' + key);
  if (stc) stc.textContent = rows.length;

  if (!rows.length) {
    el.innerHTML = '<div class="placeholder-panel">✅ لا توجد حالات حالياً</div>';
    return;
  }

  const tbody = rows.map((r, i) => {
    const fkey = key + '::' + r.name;
    return `<tr>
      <td class="td-num">${i+1}</td>
      <td class="td-id">${esc(r.name)}</td>
      <td class="td-am">${esc(r.owner)}</td>
      <td class="td-notes" data-fkey="${esc(fkey)}">
        <div class="notes-thread">${renderNotes(getNotes(fkey), fkey)}</div>
        <div class="note-new">
          <textarea class="note-inp" rows="1" placeholder="متابعة جديدة... (Ctrl+Enter للحفظ)"></textarea>
          <div class="note-actions">
            <button class="note-add-btn" onclick="addNote(this)">+ إضافة</button>
            <span class="save-ind"></span>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr>
      <th style="width:36px;text-align:center">#</th>
      <th>ID / اسم العميل</th>
      <th style="text-align:center">الاكونت مانجر</th>
      <th>المتابعات</th>
    </tr></thead>
    <tbody>${tbody}</tbody>
  </table></div>`;

  el.querySelectorAll('.note-inp').forEach(ta => {
    ta.addEventListener('input', () => autoH(ta));
    ta.addEventListener('keydown', e => {
      if (e.key==='Enter' && (e.ctrlKey||e.metaKey)) {
        e.preventDefault();
        addNote(ta.closest('.note-new').querySelector('.note-add-btn'));
      }
    });
  });
}

function renderNotes(notes, fkey) {
  if (!notes.length) return '';
  return notes.map((n, idx) => `
    <div class="note-item">
      <span class="note-date">${fmtDate(n.date)}</span>
      <span class="note-text">${esc(n.text)}</span>
      <button class="note-del" onclick="delNote(${JSON.stringify(fkey)},${idx})" title="حذف">✕</button>
    </div>`).join('');
}

function getNotes(fkey) {
  const e = _feedback[fkey];
  if (!e) return [];
  if (e.notes) return e.notes;
  // Migrate old single-feedback format
  if (e.feedback) return [{ text:e.feedback, date:(e.updatedAt||'').slice(0,10), addedAt:e.updatedAt }];
  return [];
}

// ── Add note ──────────────────────────────────────────────────────────────────
async function addNote(btn) {
  const newDiv = btn.closest('.note-new');
  const ta     = newDiv.querySelector('.note-inp');
  const si     = newDiv.querySelector('.save-ind');
  const td     = btn.closest('td.td-notes');
  const fkey   = td.dataset.fkey;
  const text   = ta.value.trim();
  if (!text) { ta.focus(); return; }

  btn.disabled = true;
  si.className = 'save-ind saving'; si.textContent = '...';

  const today   = new Date().toISOString().slice(0,10);
  const newNote = { text, date:today, addedAt:new Date().toISOString() };

  try {
    const getR    = await ghGet(FB_FILE);
    const getData = await getR.json();
    const remote  = JSON.parse(b64dec(getData.content));

    const existing = remote[fkey] || {};
    let notes = existing.notes || [];
    if (!existing.notes && existing.feedback) {
      notes = [{ text:existing.feedback, date:(existing.updatedAt||'').slice(0,10), addedAt:existing.updatedAt }];
    }
    notes = [newNote, ...notes];
    remote[fkey] = { notes };
    _feedback = remote;

    await ghPut(FB_FILE, remote, getData.sha, 'quality: add note');

    ta.value = ''; autoH(ta);
    td.querySelector('.notes-thread').innerHTML = renderNotes(notes, fkey);
    si.className='save-ind saved'; si.textContent='✓ تم الحفظ';
    setTimeout(() => { si.className='save-ind'; si.textContent=''; }, 3000);

  } catch(e) {
    si.className='save-ind err'; si.textContent='✗ خطأ';
    console.error('addNote:', e);
  }
  btn.disabled = false;
}

// ── Delete note ───────────────────────────────────────────────────────────────
async function delNote(fkey, idx) {
  if (!confirm('حذف هذه المتابعة؟')) return;
  const notes = [...getNotes(fkey)];
  notes.splice(idx, 1);
  try {
    const getR    = await ghGet(FB_FILE);
    const getData = await getR.json();
    const remote  = JSON.parse(b64dec(getData.content));
    remote[fkey] = { notes };
    _feedback = remote;
    await ghPut(FB_FILE, remote, getData.sha, 'quality: delete note');
    // Update all TDs that match this fkey
    document.querySelectorAll('.td-notes').forEach(td => {
      if (td.dataset.fkey === fkey) {
        td.querySelector('.notes-thread').innerHTML = renderNotes(notes, fkey);
      }
    });
  } catch(e) { console.error('delNote:', e); alert('خطأ في الحذف'); }
}

// ── GitHub helpers ────────────────────────────────────────────────────────────
function ghGet(path) {
  return fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+path,
    { headers:{ Authorization:'token '+GH_TOKEN, Accept:'application/vnd.github+json' } });
}
function ghPut(path, obj, sha, msg) {
  return fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+path, {
    method:'PUT',
    headers:{ Authorization:'token '+GH_TOKEN, Accept:'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify({ message:msg, content:b64enc(JSON.stringify(obj,null,2)), sha })
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function autoH(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
function fmtDate(d){ if(!d)return''; const p=d.split('-'); return (p[2]||'??')+'/'+(p[1]||'??'); }
function b64dec(b){ return decodeURIComponent(escape(atob(b.replace(/\s/g,'')))); }
function b64enc(s){ return btoa(unescape(encodeURIComponent(s))); }

// ── Tab navigation ────────────────────────────────────────────────────────────
function showMainTab(name) {
  MAIN_TABS.forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
  });
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', MAIN_TABS[i]===name);
  });
}

function showSubTab(main, sub) {
  SUB_TABS[main].forEach(k => {
    const p = document.getElementById('sub-'+main+'-'+k);
    if (p) p.classList.toggle('active', k===sub);
  });
  const tab = document.getElementById('tab-'+main);
  if (tab) {
    tab.querySelectorAll('.sub-tab-btn').forEach((b,i) => {
      b.classList.toggle('active', SUB_TABS[main][i]===sub);
    });
  }
}
</script>
</body>
</html>
